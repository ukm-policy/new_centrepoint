<script>
        // Simple micro-interaction scripts could go here
        document.addEventListener('DOMContentLoaded', () => {
            const tappers = document.querySelectorAll('.bounce-tapper');
            tappers.forEach(tapper => {
                tapper.addEventListener('mousedown', () => {
                    tapper.style.transform = 'scale(0.95)';
                    if(tapper.classList.contains('shadow-[4px_4px_0px_0px_rgba(34,34,34,1)]')) {
                        tapper.classList.remove('shadow-[4px_4px_0px_0px_rgba(34,34,34,1)]');
                        tapper.classList.add('shadow-[1px_1px_0px_0px_rgba(34,34,34,1)]');
                    }
                });
                tapper.addEventListener('mouseup', () => {
                    tapper.style.transform = '';
                    if(tapper.classList.contains('shadow-[1px_1px_0px_0px_rgba(34,34,34,1)]')) {
                        tapper.classList.remove('shadow-[1px_1px_0px_0px_rgba(34,34,34,1)]');
                        tapper.classList.add('shadow-[4px_4px_0px_0px_rgba(34,34,34,1)]');
                    }
                });
                tapper.addEventListener('mouseleave', () => {
                    tapper.style.transform = '';
                    if(tapper.classList.contains('shadow-[1px_1px_0px_0px_rgba(34,34,34,1)]')) {
                        tapper.classList.remove('shadow-[1px_1px_0px_0px_rgba(34,34,34,1)]');
                        tapper.classList.add('shadow-[4px_4px_0px_0px_rgba(34,34,34,1)]');
                    }
                });
            });
        });
    </script>
