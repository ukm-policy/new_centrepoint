name: centrepoint
description: "Policy Centrepoint — UKM POLICY mobile app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  go_router: ^14.6.3
  cached_network_image: ^3.4.1
  provider: ^6.1.2
  firebase_core: ^4.11.0
  supabase_flutter: ^2.6.0
  jwt_decoder: ^2.0.1
  image_picker: ^1.1.2
  mobile_scanner: ^5.2.1
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/
    - .env

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo_ukmpolicy.png"
