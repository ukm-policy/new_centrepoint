<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Policy Centrepoint - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface": "#1a1c1c",
                        "tertiary": "#5e5d5d",
                        "tertiary-fixed": "#e5e2e1",
                        "on-tertiary-fixed": "#1b1c1c",
                        "primary-fixed-dim": "#ffb3b2",
                        "surface-dim": "#dadada",
                        "outline": "#8f6f6f",
                        "on-primary-container": "#ffffff",
                        "tertiary-fixed-dim": "#c8c6c5",
                        "inverse-surface": "#2f3131",
                        "on-surface-variant": "#5b4040",
                        "primary-fixed": "#ffdad9",
                        "surface-container-low": "#f3f3f4",
                        "on-primary-fixed-variant": "#92001f",
                        "on-secondary": "#ffffff",
                        "secondary-fixed": "#93f7ba",
                        "inverse-on-surface": "#f0f1f1",
                        "secondary": "#006d41",
                        "on-secondary-container": "#007144",
                        "surface": "#f9f9f9",
                        "on-primary": "#ffffff",
                        "tertiary-container": "#777676",
                        "background": "#f9f9f9",
                        "inverse-primary": "#ffb3b2",
                        "surface-variant": "#e2e2e2",
                        "bg-gray": "#EFECEC",
                        "on-secondary-fixed": "#002110",
                        "black-charcoal": "#222222",
                        "surface-container-highest": "#e2e2e2",
                        "on-tertiary": "#ffffff",
                        "on-error-container": "#93000a",
                        "surface-bright": "#f9f9f9",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-container": "#ffffff",
                        "on-tertiary-fixed-variant": "#474746",
                        "outline-variant": "#e3bebd",
                        "on-error": "#ffffff",
                        "secondary-fixed-dim": "#77da9f",
                        "primary-container": "#dc3545",
                        "on-secondary-fixed-variant": "#00522f",
                        "surface-container-high": "#e8e8e8",
                        "border-slate": "#E2E8F0",
                        "error-container": "#ffdad6",
                        "primary": "#b9172f",
                        "on-primary-fixed": "#410008",
                        "on-background": "#1a1c1c",
                        "surface-container": "#eeeeee",
                        "error": "#ba1a1a",
                        "surface-tint": "#ba1830",
                        "secondary-container": "#90f4b7"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "inner-padding": "12px",
                        "appbar-padding": "12px",
                        "stack-gap": "16px",
                        "margin-page": "16px",
                        "gutter-grid": "12px"
                    },
                    "fontFamily": {
                        "headline-sm": ["Bricolage Grotesque"],
                        "label-bold": ["Bricolage Grotesque"],
                        "display-lg": ["Bricolage Grotesque"],
                        "body-lg": ["Bricolage Grotesque"],
                        "headline-md": ["Bricolage Grotesque"],
                        "body-md": ["Bricolage Grotesque"],
                        "display-lg-mobile": ["Bricolage Grotesque"]
                    },
                    "fontSize": {
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "700" }],
                        "label-bold": ["12px", { "lineHeight": "16px", "fontWeight": "700" }],
                        "display-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "500" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "display-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "800" }]
                    }
                }
            }
        }
    </script>
<style>
        .hard-shadow {
            box-shadow: 4px 4px 0px 0px rgba(34,34,34,1);
        }
        .bouncetapper:active {
            transform: scale(0.95);
            box-shadow: 1px 1px 0px 0px rgba(34,34,34,1);
            transform-origin: center;
        }
        .divider-dashed {
            border-bottom: 2px dashed #E2E8F0;
        }
    </style>
</head>
<body class="bg-bg-gray text-on-surface font-body-md h-screen w-full flex items-center justify-center p-margin-page">
<div class="w-full max-w-md bg-surface border-2 border-black-charcoal hard-shadow rounded-xl p-6 flex flex-col gap-6">
<!-- Header -->
<div class="text-center pb-6 divider-dashed">
<h1 class="font-display-lg-mobile text-display-lg-mobile md:font-display-lg md:text-display-lg text-primary tracking-tight">POLICY CENTREPOINT</h1>
<p class="font-body-md text-body-md text-tertiary mt-2">Selamat datang kembali. Silakan masuk untuk melanjutkan.</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-5">
<!-- Email Input -->
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface uppercase" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-tertiary" data-icon="mail">mail</span>
<input class="w-full bg-[#F6F8FA] border-slate border focus:border-2 focus:border-black-charcoal rounded-lg py-3 pl-10 pr-4 font-body-md text-body-md text-on-surface outline-none transition-all" id="email" placeholder="nama@email.com" type="email">
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="font-label-bold text-label-bold text-on-surface uppercase" for="password">Password</label>
<a class="font-label-bold text-label-bold text-primary hover:underline" href="#">Lupa?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-tertiary" data-icon="lock">lock</span>
<input class="w-full bg-[#F6F8FA] border-slate border focus:border-2 focus:border-black-charcoal rounded-lg py-3 pl-10 pr-4 font-body-md text-body-md text-on-surface outline-none transition-all" id="password" placeholder="••••••••" type="password">
</div>
</div>
<!-- Actions -->
<div class="flex flex-col gap-4 mt-2">
<button class="bouncetapper bg-primary-container text-on-primary-container border-2 border-black-charcoal hard-shadow rounded-lg py-3 font-headline-sm text-headline-sm flex justify-center items-center gap-2 transition-all duration-100" type="button">
                    MASUK
                    <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<div class="relative flex items-center py-2">
<div class="flex-grow border-t-2 border-dashed border-border-slate"></div>
<span class="flex-shrink-0 mx-4 font-label-bold text-label-bold text-tertiary">ATAU</span>
<div class="flex-grow border-t-2 border-dashed border-border-slate"></div>
</div>
<button class="bouncetapper bg-surface text-on-surface border-2 border-black-charcoal rounded-lg py-3 font-headline-sm text-headline-sm flex justify-center items-center gap-2 hover:bg-surface-variant transition-all duration-100" type="button">
<svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path></svg>
                    Masuk dengan Google
                </button>
</div>
</form>
<!-- Footer -->
<div class="text-center pt-4 divider-dashed border-t border-b-0">
<p class="font-body-md text-body-md text-on-surface">
                Belum punya akun? 
                <a class="font-label-bold text-label-bold text-primary hover:underline ml-1" href="#">Daftar sekarang</a>
</p>
</div>
</div>
</body></html>
